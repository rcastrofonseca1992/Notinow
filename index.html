
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <meta name="theme-color" content="#F8F9FA" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <script>
        (function () {
          try {
            var darkStored = localStorage.getItem('darkMode');
            var bedTimeStored = localStorage.getItem('bedTimeMode') === 'true';
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var isDark = bedTimeStored || (darkStored === null ? prefersDark : darkStored === 'true');
            var themeColor = bedTimeStored ? '#000000' : (isDark ? '#0F172A' : '#F8F9FA');
            var root = document.documentElement;
            if (bedTimeStored) {
              root.classList.add('bed-time');
              root.setAttribute('data-bed-time', 'true');
              root.classList.remove('dark');
            } else if (isDark) {
              root.classList.add('dark');
              root.removeAttribute('data-bed-time');
            } else {
              root.classList.remove('dark');
              root.removeAttribute('data-bed-time');
            }
            var themeMeta = document.querySelector('meta[name="theme-color"]');
            if (themeMeta) themeMeta.setAttribute('content', themeColor);
            var appleMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
            if (appleMeta) {
              appleMeta.setAttribute('content', isDark || bedTimeStored ? 'black-translucent' : 'default');
            }
          } catch (e) {}
        })();
      </script>
      <title>Notinow</title>
      <!-- Preconnect to external domains for faster resource loading -->
      <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
      <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
      <!-- Preload critical resources -->
      <link rel="modulepreload" href="/src/main.tsx" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
